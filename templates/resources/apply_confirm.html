{% extends "base.html" %}

{% block title %}Sanaa-Sync | Apply for {{ gig.title }}{% endblock %}

{% block content %}
<div style="background: #0a0a0a; min-height: 80vh; display: flex; align-items: center; justify-content: center; color: white; padding: 20px;">
    <div style="background: #161616; padding: 40px; border-radius: 8px; border: 1px solid #333; width: 100%; max-width: 500px;">
        
        <div style="margin-bottom: 30px;">
            <h2 style="color: #007bff; margin: 0 0 10px 0;">APPLY FOR GIG</h2>
            <h3 style="font-size: 1.1rem; margin: 0;">{{ gig.title }}</h3>
            <p style="color: #666; font-size: 0.9rem; margin-top: 5px;">📍 {{ gig.location }} | 📅 {{ gig.event_date|date:"d M Y" }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 10px; font-size: 0.85rem; color: #aaa;">Pitch yourself to the organizers (Optional):</label>
                <textarea name="message" rows="4" placeholder="Why are you the right artist for this gig?" 
                    style="width: 100%; background: #222; border: 1px solid #444; border-radius: 4px; color: white; padding: 12px; font-family: inherit; resize: none; box-sizing: border-box;"></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <button type="submit" style="flex: 2; background: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 600; cursor: pointer;">
                    Submit Application
                </button>
                <a href="{% url 'gig_list' %}" style="flex: 1; text-align: center; background: #333; color: white; text-decoration: none; padding: 12px; border-radius: 4px; font-size: 0.9rem;">
                    Cancel
                </a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
