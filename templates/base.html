<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sanaa-Sync | Hub{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a; /* Darkest theme */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        nav {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .logo {
            font-weight: 700;
            color: #007bff; /* Professional Blue */
            text-decoration: none;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <nav>
    <a href="/" class="logo">SANAA-SYNC</a>
    <div class="nav-links">
        <a href="{% url 'gig_list' %}" style="margin-right: 20px; color: white; text-decoration: none;">Gigs</a>
        
        {% if user.is_authenticated %}
            <span style="color: #888; margin-right: 15px;">Mambo, {{ user.username }}!</span>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
    {% csrf_token %}
    <button type="submit" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-family: inherit; font-size: inherit; padding: 0;">
        Logout
    
    </button>
</form>
        {% else %}
            <a href="{% url 'login' %}" style="margin-right: 15px; color: white; text-decoration: none;">Login</a>
            <a href="{% url 'join_hub' %}" style="background: #007bff; padding: 8px 15px; border-radius: 4px; color: white; text-decoration: none;">Join the Hub</a>
        {% endif %}
    </div>
</nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
